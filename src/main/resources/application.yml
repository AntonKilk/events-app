spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/events}
    username: ${DB_USER:events}
    password: ${DB_PASSWORD:events}
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  session:
    store-type: none

server:
  port: 8080

app:
  admin:
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:changeme}
